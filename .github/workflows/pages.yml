name: Refresh and deploy bacterial pathogen dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Every Monday at 06:17 UTC. Curated claims still require manual review.
    - cron: "17 6 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh ClinicalTrials.gov records
        run: python scripts/fetch_pipeline.py

      - name: Validate generated data
        run: python scripts/validate_data.py

      - name: Build static dashboard
        run: python scripts/build_dashboard.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
